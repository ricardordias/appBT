<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Quadras</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="admin-quadras-content">
  <ion-button expand="block" color="primary" (click)="abrirModal()" class="admin-quadras-btn-add">
    Cadastrar quadra
  </ion-button>

  <div class="admin-quadras-list">
    <ion-card *ngFor="let q of quadras" class="admin-quadras-card">
      <ion-card-content class="admin-quadras-card-content">
        <div class="admin-quadras-card-text">
          <h2 class="admin-quadras-card-title">{{ q.nome }}</h2>
          <p class="admin-quadras-card-subtitle">{{ q.endereco }}</p>
        </div>
        <ion-button fill="clear" size="small" (click)="abrirModal(q)" class="admin-quadras-btn-edit">Editar</ion-button>
        <ion-toggle [checked]="q.ativa" (ionChange)="toggleAtiva(q)" slot="end"></ion-toggle>
      </ion-card-content>
    </ion-card>
  </div>

  <ion-item *ngIf="quadras.length === 0" lines="none" class="admin-quadras-empty">
    <ion-label class="admin-quadras-empty-label">Nenhuma quadra cadastrada.</ion-label>
  </ion-item>

  <ion-card *ngIf="modalAberto" class="admin-quadras-modal-card">
    <ion-card-header class="admin-quadras-modal-header">
      <ion-card-title class="admin-quadras-modal-title">{{ editando ? 'Editar quadra' : 'Nova quadra' }}</ion-card-title>
    </ion-card-header>
    <ion-card-content class="admin-quadras-modal-content">
      <ion-item class="admin-quadras-modal-item" lines="none">
        <ion-label position="stacked">Nome</ion-label>
        <ion-input [(ngModel)]="formNome" placeholder="Ex: Quadra 1" class="admin-quadras-modal-input"></ion-input>
      </ion-item>
      <ion-item class="admin-quadras-modal-item" lines="none">
        <ion-label position="stacked">Endereço</ion-label>
        <ion-input [(ngModel)]="formEndereco" placeholder="Endereço" class="admin-quadras-modal-input"></ion-input>
      </ion-item>
      <ion-button expand="block" color="primary" (click)="salvar()" class="admin-quadras-modal-btn">Salvar</ion-button>
      <ion-button expand="block" fill="outline" (click)="fecharModal()" class="admin-quadras-modal-btn-outline">Cancelar</ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
