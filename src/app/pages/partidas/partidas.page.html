<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Partidas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="partidas-content">
  <ion-segment [(ngModel)]="segment" (ionChange)="segmentChanged()" class="partidas-segment">
    <ion-segment-button value="todas">
      <ion-label>Todas</ion-label>
    </ion-segment-button>
    <ion-segment-button value="minhas">
      <ion-label>Minhas</ion-label>
    </ion-segment-button>
  </ion-segment>

  <div class="partidas-list" *ngIf="partidas.length > 0">
    <ion-card *ngFor="let p of partidas" class="partida-card">
      <ion-card-header class="partida-card-header">
        <ion-card-title class="partida-card-title">{{ p.quadraNome }}</ion-card-title>
        <p class="partida-card-meta">
          {{ p.data }} às {{ p.horario }}
          <span class="partida-card-categoria">{{ p.categoria }}</span>
          · Nível {{ p.nivel }}
        </p>
      </ion-card-header>
      <ion-card-content class="partida-card-content">
        <p class="partida-vagas">Vagas: {{ p.jogadoresConfirmados.length }}/{{ p.vagasTotais }}</p>
        <ion-badge *ngIf="p.modoEmergencia" color="warning" class="partida-badge">Modo emergência</ion-badge>
        <ion-button
          *ngIf="auth.isAdmin() && !p.modoEmergencia"
          size="small"
          fill="outline"
          color="secondary"
          (click)="ativarModoEmergencia(p)"
          class="partida-btn partida-btn-emergencia"
        >
          Ativar modo emergência
        </ion-button>
        <ion-button
          *ngIf="!jaConfirmado(p) && vagasRestantes(p) > 0"
          size="small"
          color="primary"
          (click)="confirmarPresenca(p)"
          class="partida-btn"
        >
          Confirmar presença
        </ion-button>
        <p *ngIf="jaConfirmado(p)" class="partida-confirmado">Você está confirmado.</p>
      </ion-card-content>
    </ion-card>
  </div>

  <ion-item *ngIf="partidas.length === 0" lines="none" class="partidas-empty">
    <ion-label class="partidas-empty-label">Nenhuma partida encontrada.</ion-label>
  </ion-item>
</ion-content>
