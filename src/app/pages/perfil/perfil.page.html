<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Meu perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="perfil-content">
  @if (auth.getCurrentUser(); as user) {
  <ion-card class="perfil-card">
    <ion-card-header class="perfil-card-header">
      <ion-card-title class="perfil-card-title">{{ user.nome }}</ion-card-title>
      <p class="perfil-card-subtitle">{{ user.tipo === 'admin' ? 'Administrador' : 'Jogador' }}</p>
    </ion-card-header>
    <ion-card-content class="perfil-card-content">
      @if (user.loginEmail) {
      <ion-item class="perfil-item" lines="none">
        <ion-label>
          <p class="perfil-label">E-mail</p>
          <p class="perfil-value">{{ user.loginEmail }}</p>
        </ion-label>
      </ion-item>
      }
      @if (user.tipo === 'comum') {
      <ion-item class="perfil-item" lines="none">
        <ion-label>
          <p class="perfil-label">Categoria</p>
          <p class="perfil-value">{{ user.nivel }}</p>
        </ion-label>
      </ion-item>
      }
    </ion-card-content>
  </ion-card>
  }
</ion-content>
